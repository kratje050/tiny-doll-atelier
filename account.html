<!doctype html>
<html lang="nl">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Mijn account - Tiny Doll Atelier</title>
    <meta name="description" content="Log in bij Tiny Doll Atelier om je aanvragen, betaalstatus en track & trace te bekijken." />
    <meta name="theme-color" content="#6f4328" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="apple-touch-icon" href="/assets/app-icon-180.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="/assets/app-icon-192.png" />
    <link rel="stylesheet" href="/styles.css" />
    <link rel="stylesheet" href="/account.css" />
  </head>
  <body class="account-body account-loading">
    <header class="account-header">
      <a class="brand" href="/" aria-label="Terug naar Tiny Doll Atelier">
        <span class="brand-mark">T</span>
        <span>
          <strong>Tiny Doll Atelier</strong>
          <small>mijn account</small>
        </span>
      </a>
      <nav class="account-topnav" aria-label="Account navigatie">
        <a href="/">Webshop</a>
        <a href="/account" data-account-nav>Mijn account</a>
        <button type="button" data-logout hidden>Uitloggen</button>
      </nav>
    </header>

    <main class="account-main">
      <section class="account-hero">
        <p class="eyebrow">Mijn account</p>
        <h1 data-page-title>Welkom bij Tiny Doll Atelier</h1>
        <p data-page-intro>Log in om je aanvragen, betaalstatus en track & trace te bekijken.</p>
      </section>

      <section class="account-message" data-account-message hidden></section>
      <div data-route-root></div>
    </main>

    <script src="/account.js"></script>
  </body>
</html>
