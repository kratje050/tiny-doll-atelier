[build]
publish = "."

[build.environment]
SECRETS_SCAN_OMIT_KEYS = "ADMIN_EMAILS,ADMIN_EMAIL,EMAIL_FROM,SMTP_USER,SMTP_HOST,SMTP_PORT,NETLIFY_BLOBS_SITE_ID,NETLIFY_BLOBS_TOKEN"

[functions]
directory = "netlify/functions"
included_files = ["admin.html"]

[[redirects]]
from = "/admin"
to = "/.netlify/functions/admin"
status = 200
force = true

[[redirects]]
from = "/admin/"
to = "/.netlify/functions/admin"
status = 200
force = true

[[redirects]]
from = "/admin.html"
to = "/.netlify/functions/admin"
status = 200
force = true

[[redirects]]
from = "/admin/logout"
to = "/.netlify/functions/admin"
status = 200
force = true

[[redirects]]
from = "/account/order/*"
to = "/account.html"
status = 200

[[redirects]]
from = "/account/*"
to = "/account.html"
status = 200

[[redirects]]
from = "/account"
to = "/account.html"
status = 200

[[redirects]]
from = "/login"
to = "/account.html"
status = 200

[[redirects]]
from = "/register"
to = "/account.html"
status = 200

[[redirects]]
from = "/forgot-password"
to = "/account.html"
status = 200

[[redirects]]
from = "/reset-password"
to = "/account.html"
status = 200
