[build]
publish = "."

[build.environment]
SECRETS_SCAN_OMIT_KEYS = "ADMIN_EMAILS,ADMIN_EMAIL,EMAIL_FROM,SMTP_USER,SMTP_HOST,SMTP_PORT,NETLIFY_BLOBS_SITE_ID,NETLIFY_BLOBS_TOKEN,NETLIFY_SITE_ID,NETLIFY_AUTH_TOKEN,NETLIFY_API_TOKEN"

[functions]
directory = "netlify/functions"
included_files = ["admin.html"]

[[redirects]]
from = "/admin"
to = "/.netlify/functions/admin"
status = 200
force = true

[[redirects]]
from = "/admin/"
to = "/.netlify/functions/admin"
status = 200
force = true

[[redirects]]
from = "/admin.html"
to = "/.netlify/functions/admin"
status = 200
force = true

[[redirects]]
from = "/admin/logout"
to = "/.netlify/functions/admin"
status = 200
force = true
